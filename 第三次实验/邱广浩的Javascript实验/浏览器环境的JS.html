<html>
<body>
    <h1>JavaScript 操作 HTML 综合演示</h1>
    <p id="demo">JavaScript 可以修改内容、样式，也能隐藏/显示</p>

    <img id="myImage" src="eg_bulboff.gif" style="margin:10px 0;">

    <br>
    <button onclick="document.getElementById('demo').innerHTML = 'Hello JavaScript！'">改变 HTML 内容</button>
    <button onclick="document.getElementById('demo').style.fontSize='35px'">改变 HTML 样式</button>
    <button onclick="document.getElementById('demo').style.display='none'">隐藏 HTML 元素</button>
    <button onclick="document.getElementById('demo').style.display='block'">显示 HTML 元素</button>
    <button onclick="document.getElementById('myImage').src='eg_bulbon.gif'">开灯</button>
    <button onclick="document.getElementById('myImage').src='eg_bulboff.gif'">关灯</button>

</body>
</html>
