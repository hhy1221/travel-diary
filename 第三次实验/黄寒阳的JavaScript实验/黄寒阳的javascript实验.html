<!DOCTYPE html>
<html>

<meta charset="UTF-8">
<title>凡星支教队</title>

<body>
<h1>电子科技大学计算机学院凡星支教队</h1>
<p id="demo">凡星支教队，点亮乡村教育之光</p>
<button onclick="changeContent()">改变内容</button>
<button onclick="changeStyle()">改变样式</button>
<button onclick="hidePara()">隐藏</button>
<button onclick="showPara()">显示</button>
<button onclick="showAlert()">弹窗问候</button>

<button onclick="showYears()">显示成立年数</button>
<button onclick="showMembers()">显示成员列表</button>
<button onclick="addVolunteer()">添加志愿者</button>
<button onclick="readExternalFile()">读取外部消息</button>

<script>
"use strict";
var teamName = "凡星支教队";
var year = 2026;
var isActive = true;
var members = ["黄寒阳", "寒阳黄", "阳黄寒"];
var teamInfo = {school:"电子科大", college:"计算机学院", slogan:"凡星点点，汇聚成光"};

console.log(teamName, year, isActive);
console.log(members);
console.log(teamInfo);

function greet(name) {
    return "Hello " + name + "，来自" + teamInfo.college;
}

var getSlogan = function() {
    return teamInfo.slogan;
};

(function() {
    var x = "自调用: 支教队加油！";
    console.log(x);
})();

var doubleYear = (y) => y * 2;
console.log("双倍年份:", doubleYear(year));


var car = "校车";
function testScope() {
    var car = "自行车";
    console.log("函数内car:", car);
}
testScope();
console.log("全局car:", car);

    var varX = "var在块内";

var liftedVar = "凡星加油";
console.log("提升后:", liftedVar);


function strictFunc() {
    "use strict";
    var declaredVar = "已声明";
    console.log(declaredVar);
}
strictFunc();

function changeContent() {
    document.getElementById("demo").innerHTML = "凡星支教队正在服务凉山小学";
}
function changeStyle() {
    document.getElementById("demo").style.fontSize = "25px";
    document.getElementById("demo").style.color = "red";
}
function hidePara() {
    document.getElementById("demo").style.display = "none";
}
function showPara() {
    document.getElementById("demo").style.display = "block";
}
function showAlert() {
    alert(greet("支教志愿者") + " " + getSlogan());
}

var foundationYear = 2020;

function showYears() {
    var activeYears = year - foundationYear;
    alert("凡星支教队成立于" + foundationYear + "年，至今已成立" + activeYears + "年。");
}

function showMembers() {
    alert("支教队成员：\n" + members.join("\n"));
}

function addVolunteer() {
    var newMember = "新志愿者";
    members.push(newMember);
    alert("已添加：" + newMember + "\n当前成员：\n" + members.join("\n"));
}

function readExternalFile() {
    fetch('team_message.txt')
        .then(response => response.text())
        .then(text => alert("外部文件内容：\n" + text))
        .catch(error => alert("读取失败，请确认 team_message.txt 文件存在"));
}
</script>
</body>
</html>
